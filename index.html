<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Medicinas</title>

  <style>
    body{font-family:Arial,sans-serif;background:#fff7fb;margin:0;padding:14px;color:#1f2937}
    .container{max-width:900px;margin:auto}
    h1{text-align:center;color:#c04f86;font-size:32px}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tabs button{flex:1;background:#e3a7c4;color:white;border:0;padding:13px;border-radius:12px;font-weight:bold}
    .card{background:white;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    .hidden{display:none}
    .legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
    .legend-item{background:#f9f1f6;border-radius:14px;padding:12px}
    .symbol{font-size:24px;font-weight:bold}
    .dose{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#f9f1f6;padding:14px;border-radius:14px;margin-top:10px}
    .dose.done{background:#e4f8e7}
    .dose.next{border:3px solid #c04f86}
    .dose.late{background:#ffe5e5}
    .info{flex:1}
    .title{font-weight:bold;font-size:17px}
    .small{color:#666;font-size:14px;margin-top:4px}
    button{border:0;border-radius:12px;padding:11px;font-weight:bold;cursor:pointer;background:#c04f86;color:white}
    button.done{background:#3ca65c}
    button.gray{background:#777;width:100%;margin-top:10px}
    .progress{background:#f3e1eb;border-radius:999px;height:18px;overflow:hidden;margin-top:10px}
    .progress-bar{height:100%;background:#c04f86;width:0%}
    .next-box{background:#fff3cd;border-left:6px solid #f0ad4e;border-radius:14px;padding:14px;margin-bottom:12px}
    @media(max-width:600px){
      body{padding:10px}
      h1{font-size:25px}
      .tabs{flex-direction:column}
      .card{padding:15px}
      .dose{align-items:flex-start}
      button{min-width:75px}
    }
  </style>
</head>

<body>
<div class="container">
  <h1>💊 Control de Medicinas</h1>

  <div class="tabs">
    <button onclick="showTab('treatment')">Tratamiento</button>
    <button onclick="showTab('medicines')">Medicamentos</button>
    <button onclick="showTab('legend')">Simbología</button>
  </div>

  <section id="treatment" class="card">
    <h2>Tratamiento principal</h2>
    <div id="nextDose"></div>
    <div id="summary"></div>
    <div id="schedule"></div>
    <button class="gray" onclick="resetTreatment()">Reiniciar checks del tratamiento</button>
  </section>

  <section id="medicines" class="card hidden">
    <h2>Medicamentos programados</h2>
    <p class="small">Inicio: hoy a las 8:00 PM. Cada check guarda la hora real en que se dio.</p>
    <div id="medicineNext"></div>
    <div id="medicineSummary"></div>
    <div id="medicineList"></div>
    <button class="gray" onclick="resetMedicineChecks()">Reiniciar checks de medicamentos</button>
  </section>

  <section id="legend" class="card hidden">
    <h2>Simbología</h2>
    <div class="legend">
      <div class="legend-item">
        <div class="symbol">⬜</div>
        <strong>Combivent</strong>
        <div class="small">8 gotas</div>
      </div>
      <div class="legend-item">
        <div class="symbol">🔺</div>
        <strong>Salbutamol</strong>
        <div class="small">3 gotas</div>
      </div>
      <div class="legend-item">
        <div class="symbol">⭕</div>
        <strong>Pulmicort</strong>
        <div class="small">1/2 ampolla</div>
      </div>
      <div class="legend-item">
        <div class="symbol">💧</div>
        <strong>Suero fisiológico</strong>
        <div class="small">1.5 ml</div>
      </div>
    </div>
  </section>
</div>

<script>
  const TREATMENT_KEY = "tratamiento_checks_630pm";
  const MEDICINE_KEY = "medicamentos_checks_8pm";
  const START_KEY = "tratamiento_inicio_630pm";
  const MEDICINE_START_KEY = "medicamentos_inicio_8pm";

  const medicineInfo = {
    "⬜": { name: "Combivent", dose: "8 gotas + 1.5 ml suero fisiológico" },
    "🔺": { name: "Salbutamol", dose: "3 gotas + 1.5 ml suero fisiológico" },
    "⭕": { name: "Pulmicort", dose: "1/2 ampolla + 1.5 ml suero fisiológico" }
  };

  const firstBlock = [
    { symbol: "🔺", minutesAfterStart: 0 },
    { symbol: "🔺", minutesAfterStart: 30 },
    { symbol: "🔺", minutesAfterStart: 90 },
    { symbol: "⬜", minutesAfterStart: 150 },
    { symbol: "⭕", minutesAfterStart: 210 }
  ];

  const repeatingPattern = ["🔺", "⬜", "🔺", "⬜", "🔺", "⬜", "⭕"];

  const fixedMedicines = [
    {
      name: "Nistat",
      dose: "Cada 6 horas",
      detail: "Por 7 días",
      startTime: "20:00",
      intervalHours: 6,
      days: 7
    },
    {
      name: "Isoprino",
      dose: "12 gotas cada 8 horas",
      detail: "Duración no indicada, se programa por 7 días",
      startTime: "20:00",
      intervalHours: 8,
      days: 7
    },
    {
      name: "Virazole",
      dose: "3 ml cada 8 horas",
      detail: "Por 5 días",
      startTime: "20:00",
      intervalHours: 8,
      days: 5
    },
    {
      name: "Flamydol",
      dose: "1 cucharada cada 8 horas",
      detail: "Duración no indicada, se programa por 5 días",
      startTime: "20:00",
      intervalHours: 8,
      days: 5
    }
  ];

  let checks = JSON.parse(localStorage.getItem(TREATMENT_KEY)) || {};
  let medicineChecks = JSON.parse(localStorage.getItem(MEDICINE_KEY)) || {};

  function getStartDate() {
    let saved = localStorage.getItem(START_KEY);
    if (saved) return new Date(saved);

    const now = new Date();
    const start = new Date(now);
    start.setHours(18, 30, 0, 0);

    localStorage.setItem(START_KEY, start.toISOString());
    return start;
  }

  function getMedicineStartDate() {
    let saved = localStorage.getItem(MEDICINE_START_KEY);
    if (saved) return new Date(saved);

    const now = new Date();
    const start = new Date(now);
    start.setHours(20, 0, 0, 0);

    localStorage.setItem(MEDICINE_START_KEY, start.toISOString());
    return start;
  }

  function getEndDate(start) {
    const end = new Date(start);
    end.setDate(end.getDate() + 1);
    end.setHours(23, 59, 59, 999);
    return end;
  }

  function formatDateTime(date) {
    return date.toLocaleString("es-CR", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function nowText() {
    return new Date().toLocaleString("es-CR", {
      dateStyle: "short",
      timeStyle: "short"
    });
  }

  function buildTreatmentPlan() {
    const start = getStartDate();
    const end = getEndDate(start);
    const plan = [];

    firstBlock.forEach((item, index) => {
      const date = new Date(start.getTime() + item.minutesAfterStart * 60000);
      if (date <= end) {
        plan.push({
          id: "first-" + index,
          date,
          symbol: item.symbol,
          block: "Bloque inicial"
        });
      }
    });

    let nextDate = new Date(start.getTime() + 330 * 60000);
    let index = 0;

    while (nextDate <= end) {
      const symbol = repeatingPattern[index % repeatingPattern.length];

      plan.push({
        id: "repeat-" + index,
        date: new Date(nextDate),
        symbol,
        block: "Ciclo cada 2 horas"
      });

      nextDate = new Date(nextDate.getTime() + 120 * 60000);
      index++;
    }

    return plan;
  }

  function buildFixedMedicinePlan() {
    const startBase = getMedicineStartDate();
    const all = [];

    fixedMedicines.forEach((med) => {
      const totalDoses = Math.floor((med.days * 24) / med.intervalHours);

      for (let i = 0; i < totalDoses; i++) {
        const date = new Date(startBase.getTime() + i * med.intervalHours * 60 * 60 * 1000);

        all.push({
          id: `${med.name}-${i}`,
          name: med.name,
          dose: med.dose,
          detail: med.detail,
          date
        });
      }
    });

    return all.sort((a, b) => a.date - b.date);
  }

  function showTab(tabId) {
    document.getElementById("treatment").classList.add("hidden");
    document.getElementById("medicines").classList.add("hidden");
    document.getElementById("legend").classList.add("hidden");

    document.getElementById(tabId).classList.remove("hidden");
    render();
  }

  function toggleTreatment(id) {
    if (checks[id]) {
      delete checks[id];
    } else {
      checks[id] = { markedAt: nowText() };
    }

    localStorage.setItem(TREATMENT_KEY, JSON.stringify(checks));
    render();
  }

  function toggleMedicine(id) {
    if (medicineChecks[id]) {
      delete medicineChecks[id];
    } else {
      medicineChecks[id] = { givenAt: nowText() };
    }

    localStorage.setItem(MEDICINE_KEY, JSON.stringify(medicineChecks));
    render();
  }

  function resetTreatment() {
    if (!confirm("¿Seguro que quieres limpiar los checks del tratamiento?")) return;
    checks = {};
    localStorage.setItem(TREATMENT_KEY, JSON.stringify(checks));
    render();
  }

  function resetMedicineChecks() {
    if (!confirm("¿Seguro que quieres limpiar los checks de medicamentos?")) return;
    medicineChecks = {};
    localStorage.setItem(MEDICINE_KEY, JSON.stringify(medicineChecks));
    render();
  }

  function getNextPending(plan, checkObject) {
    return plan.find(item => !checkObject[item.id]) || null;
  }

  function renderNextDose(plan) {
    const next = getNextPending(plan, checks);
    const box = document.getElementById("nextDose");

    if (!next) {
      box.innerHTML = `<div class="next-box"><strong>✅ Tratamiento completado hasta mañana medianoche.</strong></div>`;
      return;
    }

    const med = medicineInfo[next.symbol];

    box.innerHTML = `
      <div class="next-box">
        <div class="title">⏰ Próxima dosis de nebulización</div>
        <div class="symbol">${next.symbol}</div>
        <strong>${formatDateTime(next.date)} - ${med.name}</strong>
        <div class="small">${med.dose}</div>
        <button style="margin-top:10px;width:100%;" onclick="toggleTreatment('${next.id}')">
          Marcar aplicada
        </button>
      </div>
    `;
  }

  function renderSummary(plan) {
    const done = Object.keys(checks).length;
    const total = plan.length;
    const percent = total ? Math.round((done / total) * 100) : 0;

    document.getElementById("summary").innerHTML = `
      <p><strong>Progreso nebulizaciones:</strong> ${done}/${total} aplicadas</p>
      <div class="progress">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
    `;
  }

  function renderSchedule() {
    const plan = buildTreatmentPlan();
    const container = document.getElementById("schedule");
    const next = getNextPending(plan, checks);
    const now = new Date();

    renderNextDose(plan);
    renderSummary(plan);

    container.innerHTML = plan.map((item, index) => {
      const done = !!checks[item.id];
      const isNext = next && next.id === item.id;
      const isLate = !done && item.date < now;
      const med = medicineInfo[item.symbol];

      return `
        <div class="dose ${done ? "done" : ""} ${isNext ? "next" : ""} ${isLate ? "late" : ""}">
          <div class="info">
            <div class="title">
              ${done ? "✅" : "⏰"} ${index + 1}. ${formatDateTime(item.date)}
            </div>
            <div class="small">${item.block}</div>
            <div class="small"><span class="symbol">${item.symbol}</span> ${med.name}</div>
            <div class="small">${med.dose}</div>
            ${done ? `<div class="small">Marcada: ${checks[item.id].markedAt}</div>` : ""}
            ${isNext ? `<div class="small"><strong>Próxima pendiente</strong></div>` : ""}
            ${isLate ? `<div class="small"><strong>Atrasada</strong></div>` : ""}
          </div>
          <button class="${done ? "done" : ""}" onclick="toggleTreatment('${item.id}')">
            ${done ? "Listo" : "Dar"}
          </button>
        </div>
      `;
    }).join("");
  }

  function renderMedicineNext(plan) {
    const next = getNextPending(plan, medicineChecks);
    const box = document.getElementById("medicineNext");

    if (!next) {
      box.innerHTML = `<div class="next-box"><strong>✅ Medicamentos programados completados.</strong></div>`;
      return;
    }

    box.innerHTML = `
      <div class="next-box">
        <div class="title">⏰ Próximo medicamento</div>
        <strong>${formatDateTime(next.date)} - ${next.name}</strong>
        <div class="small">${next.dose}</div>
        <div class="small">${next.detail}</div>
        <button style="margin-top:10px;width:100%;" onclick="toggleMedicine('${next.id}')">
          Marcar dado
        </button>
      </div>
    `;
  }

  function renderMedicineSummary(plan) {
    const done = Object.keys(medicineChecks).length;
    const total = plan.length;
    const percent = total ? Math.round((done / total) * 100) : 0;

    document.getElementById("medicineSummary").innerHTML = `
      <p><strong>Progreso medicamentos:</strong> ${done}/${total} dados</p>
      <div class="progress">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
    `;
  }

  function renderMedicineList() {
    const plan = buildFixedMedicinePlan();
    const list = document.getElementById("medicineList");
    const next = getNextPending(plan, medicineChecks);
    const now = new Date();

    renderMedicineNext(plan);
    renderMedicineSummary(plan);

    list.innerHTML = plan.map((item, index) => {
      const done = !!medicineChecks[item.id];
      const isNext = next && next.id === item.id;
      const isLate = !done && item.date < now;

      return `
        <div class="dose ${done ? "done" : ""} ${isNext ? "next" : ""} ${isLate ? "late" : ""}">
          <div class="info">
            <div class="title">
              ${done ? "✅" : "💊"} ${index + 1}. ${formatDateTime(item.date)} - ${item.name}
            </div>
            <div class="small">Dosis: ${item.dose}</div>
            <div class="small">${item.detail}</div>
            ${done ? `<div class="small">Dado realmente: ${medicineChecks[item.id].givenAt}</div>` : ""}
            ${isNext ? `<div class="small"><strong>Próximo pendiente</strong></div>` : ""}
            ${isLate ? `<div class="small"><strong>Atrasado</strong></div>` : ""}
          </div>
          <button class="${done ? "done" : ""}" onclick="toggleMedicine('${item.id}')">
            ${done ? "Listo" : "Dar"}
          </button>
        </div>
      `;
    }).join("");
  }

  function render() {
    renderSchedule();
    renderMedicineList();
  }

  render();
</script>
</body>
</html>
